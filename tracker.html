route_tracker_settings_v5",PIN_LIMIT=10;function loadJSON(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch{return f}}function saveJSON(k,v){localStorage.setItem(k,JSON.stringify(v))}function casinoId(c){return(c.name+"|"+c.url).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}function allCasinos(){return DEFAULT_CASINOS.map(c=>({...c,id:casinoId(c)}))}function getState(){return loadJSON(STATE_KEY,{})}function setState(s){saveJSON(STATE_KEY,s)}function getSettings(){return loadJSON(SETTINGS_KEY,{sortMode:"static",viewMode:"all"})}function setSettings(s){saveJSON(SETTINGS_KEY,s)}function elapsedMs(iso){if(!iso)return null;const t=new Date(iso).getTime();return Number.isNaN(t)?null:Math.max(0,Date.now()-t)}function formatElapsed(ms){if(ms===null)return"ready";const m=Math.floor(ms/60000);if(m<1)return"now";if(m<60)return m+"m";const h=Math.floor(m/60),r=m%60;if(h<48)return h+"h"+(r?" "+r+"m":"");return Math.floor(h/24)+"d "+h%24+"h"}function statusFor(last){const ms=elapsedMs(last);if(ms===null)return{cls:"ready24",timerCls:"good",fillCls:"good",pct:100};const h=ms/3600000;if(h>=24)return{cls:"ready24",timerCls:"good",fillCls:"good",pct:100};if(h>=12)return{cls:"ready12",timerCls:"warn",fillCls:"warn",pct:Math.min(100,h/24*100)};return{cls:"",timerCls:"",fillCls:"",pct:Math.min(100,h/24*100)}}function escapeHTML(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function saveNote(id,val){const s=getState();s[id]=s[id]||{};s[id].note=val;setState(s);const el=document.getElementById("saved-"+id);if(el){el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),900)}}function markClicked(id){const s=getState();s[id]=s[id]||{};s[id].lastClicked=new Date().toISOString();s[id].clicks=(s[id].clicks||0)+1;setState(s);render()}function togglePin(id){const s=getState();s[id]=s[id]||{};const p=!!s[id].pinned;if(!p&&Object.values(s).filter(v=>v&&v.pinned).length>=PIN_LIMIT){alert("Top 10 pin limit reached. Unpin one before adding another.");return}s[id].pinned=!p;setState(s);render()}function badgesHTML(c){let html=`<span class="cash-badge speed">${escapeHTML(c.pay||"Unknown Pay")}</span><span class="cash-badge method">${escapeHTML(c.method||"Unknown Method")}</span>`;(c.process||[]).forEach(b=>html+=`<span class="cash-badge process">${escapeHTML(b)}</span>`);return `<div class="cash-badges">${html}</div>`}function cardHTML(c,state){const s=state[c.id]||{},st=statusFor(s.lastClicked),note=escapeHTML(s.note??c.note??""),safe=JSON.stringify(c.id),p=!!s.pinned;return `<article class="card ${st.cls} ${p?"pinned":""}"><div class="top"><button class="pin ${p?"on":""}" onclick='togglePin(${safe})'>📌</button><div class="title" title="${escapeHTML(c.name)}">${escapeHTML(c.name)}</div><div class="timer ${st.timerCls}">${formatElapsed(elapsedMs(s.lastClicked))}</div></div>${badgesHTML(c)}<div class="bar"><div class="fill ${st.fillCls}" style="width:${st.pct}%"></div></div><div class="actions"><a class="open" href="${escapeHTML(c.url)}" target="_blank" rel="noopener" onclick='markClicked(${safe})'>OPEN</a><button class="mini" onclick='markClicked(${safe})'>Log</button></div><div class="note-row"><textarea placeholder="Notes..." oninput='saveNote(${safe}, this.value)'>${note}</textarea><span id="saved-${c.id}" class="saved">saved</span></div></article>`}function sortCasinos(rows,state,mode){return rows.sort((a,b)=>{const ap=state[a.id]?.pinned?0:1,bp=state[b.id]?.pinned?0:1;if(ap!==bp)return ap-bp;if(mode==="static")return 0;const am=elapsedMs(state[a.id]?.lastClicked),bm=elapsedMs(state[b.id]?.lastClicked);return(bm===null?Infinity:bm)-(am===null?Infinity:am)})}function render(){const state=getState(),settings=getSettings(),q=document.getElementById("search").value.trim().toLowerCase();document.getElementById("sortMode").value=settings.sortMode;document.getElementById("viewMode").value=settings.viewMode;let rows=allCasinos();if(q)rows=rows.filter(c=>(c.name+" "+c.url+" "+(c.note||"")+" "+c.cadence+" "+(c.pay||"")+" "+(c.method||"")+" "+(c.process||[]).join(" ")).toLowerCase().includes(q));if(settings.viewMode==="pinned")rows=rows.filter(c=>state[c.id]?.pinned);rows=sortCasinos(rows,state,settings.sortMode);document.getElementById("list").innerHTML=rows.length?rows.map(c=>cardHTML(c,state)).join(""):`<div class="empty">No casinos found.</div>`;const base=allCasinos().filter(c=>!q||(c.name+" "+c.url+" "+(c.note||"")+" "+c.cadence).toLowerCase().includes(q));document.getElementById("countTotal").textContent=rows.length;document.getElementById("countPinned").textContent=Object.values(state).filter(v=>v&&v.pinned).length;document.getElementById("countReady12").textContent=base.filter(c=>{const ms=elapsedMs(state[c.id]?.lastClicked);return ms===null||ms>=43200000}).length;document.getElementById("countReady24").textContent=base.filter(c=>{const ms=elapsedMs(state[c.id]?.lastClicked);return ms===null||ms>=86400000}).length}document.getElementById("search").addEventListener("input",render);document.getElementById("sortMode").addEventListener("change",e=>{const s=getSettings();s.sortMode=e.target.value;setSettings(s);render()});document.getElementById("viewMode").addEventListener("change",e=>{const s=getSettings();s.viewMode=e.target.value;setSettings(s);render()});document.getElementById("resetBtn").addEventListener("click",()=>{if(confirm("Reset all local clicks, pins, and notes on this device?")){localStorage.removeItem(STATE_KEY);localStorage.removeItem(SETTINGS_KEY);render()}});setInterval(()=>{const a=document.activeElement;if(!(a&&["TEXTAREA","INPUT","SELECT"].includes(a.tagName)))render()},60000);render();</script></body></html>
